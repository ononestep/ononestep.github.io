<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnOneStep | 设计作品集</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #ffffff;
            font-family: 'Arial Black', 'Helvetica Neue Bold', sans-serif;
            color: #000000;
            line-height: 1.6;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }
        header {
            padding: 40px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            margin-bottom: 60px;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 900;
            text-decoration: none;
            color: #000000;
        }
        .back-home {
            text-decoration: none;
            color: #666;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: color 0.3s ease;
        }
        .back-home:hover {
            color: #000000;
        }
        .categories {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 60px;
            flex-wrap: wrap;
        }
        .category-btn {
            background: none;
            border: none;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #999;
            cursor: pointer;
            transition: color 0.3s ease;
        }
        .category-btn.active,
        .category-btn:hover {
            color: #000000;
        }
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 40px;
            margin-bottom: 80px;
        }
        .work-card {
            position: relative;
            overflow: hidden;
            cursor: pointer;
            aspect-ratio: 4/3;
        }
        .work-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .work-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        .work-title {
            color: #ffffff;
            font-size: 1.5rem;
            font-weight: 900;
            margin-bottom: 10px;
            text-align: center;
        }
        .work-category {
            color: #cccccc;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .work-card:hover .work-img {
            transform: scale(1.05);
        }
        .work-card:hover .work-overlay {
            opacity: 1;
        }
        /* 未完待续模块 */
        .coming-soon {
            grid-column: 1 / -1; /* 占满整行 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 80px 20px;
            border: 2px dashed #eee;
            border-radius: 12px;
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #eee;
            border-top: 3px solid #000;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        .coming-soon-text {
            font-size: 1.2rem;
            font-weight: 700;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        footer {
            text-align: center;
            padding: 40px 0;
            border-top: 1px solid #eee;
            color: #999;
            font-size: 0.85rem;
        }
        @media (max-width: 768px) {
            .portfolio-grid {
                grid-template-columns: 1fr;
            }
            .categories {
                gap: 20px;
            }
        }

        /* 大图弹窗样式 */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.9);
            display: none;
            z-index: 9999;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }
        .lightbox.show {
            display: flex;
        }
        .lightbox-img {
            max-width: 90%;
            max-height: 90vh;
            object-fit: contain;
        }
        .lightbox-close {
            position: absolute;
            top: 25px;
            right: 40px;
            color: #fff;
            font-size: 40px;
            cursor: pointer;
            user-select: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="index.html" class="logo">OnOneStep</a>
            <a href="index.html" class="back-home">← 返回首页</a>
        </header>

        <div class="categories">
            <button class="category-btn active">全部</button>
            <button class="category-btn">平面设计</button>
            <button class="category-btn">其他技能开发中</button>
        </div>

        <div class="portfolio-grid">
            <!-- 作品1：商业海报系列 -->
            <div class="work-card" data-src="images/work1.png">
                <img src="images/work1.png" alt="商业海报设计" class="work-img">
                <div class="work-overlay">
                    <h3 class="work-title">商业海报系列</h3>
                    <p class="work-category">平面设计</p>
                </div>
            </div>

            <!-- 作品2：创意海报（已修改） -->
            <div class="work-card" data-src="images/work2.png">
                <img src="images/work2.png" alt="创意海报" class="work-img">
                <div class="work-overlay">
                    <h3 class="work-title">创意海报</h3>
                    <p class="work-category">平面设计</p>
                </div>
            </div>

            <!-- 作品3：其他作品（已修改） -->
            <div class="work-card" data-src="images/work3.png">
                <img src="images/work3.png" alt="其他作品" class="work-img">
                <div class="work-overlay">
                    <h3 class="work-title">其他作品</h3>
                    <p class="work-category">平面设计</p>
                </div>
            </div>

            <!-- 未完待续模块（新增） -->
            <div class="coming-soon">
                <div class="loading-spinner"></div>
                <div class="coming-soon-text">未完待续</div>
            </div>
        </div>

        <footer>
            <p>© 2026 OnOneStep Design. All rights reserved.</p>
        </footer>
    </div>

    <!-- 大图弹窗容器 -->
    <div class="lightbox" id="lightbox">
        <span class="lightbox-close" id="closeBtn">×</span>
        <img src="" alt="大图预览" class="lightbox-img" id="bigImg">
    </div>

    <script>
        // 分类筛选
        const categoryBtns = document.querySelectorAll('.category-btn');
        categoryBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                categoryBtns.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // 点击弹出大图逻辑
        const lightbox = document.getElementById('lightbox');
        const bigImg = document.getElementById('bigImg');
        const closeBtn = document.getElementById('closeBtn');
        const workCards = document.querySelectorAll('.work-card');

        workCards.forEach(card => {
            card.addEventListener('click', () => {
                const imgUrl = card.getAttribute('data-src');
                bigImg.src = imgUrl;
                lightbox.classList.add('show');
                document.body.style.overflow = 'hidden';
            });
        });

        // 关闭方式
        closeBtn.addEventListener('click', () => {
            lightbox.classList.remove('show');
            document.body.style.overflow = '';
        });

        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) {
                lightbox.classList.remove('show');
                document.body.style.overflow = '';
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && lightbox.classList.contains('show')) {
                lightbox.classList.remove('show');
                document.body.style.overflow = '';
            }
        });
    </script>
</body>
</html>
