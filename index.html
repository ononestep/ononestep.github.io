<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onestep | Design Portfolio</title>
    <style>
        /* 全局重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 全屏白底，垂直水平居中容器 */
        body {
            background-color: #ffffff;
            font-family: 'Arial Black', 'Helvetica Neue Bold', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 可点击的文字组合容器 */
        .start-button {
            text-align: center;
            cursor: pointer;
            user-select: none; /* 禁止选中文字 */
        }

        /* 主标题 START */
        .start-title {
            font-size: 22vw; /* 响应式超大字号，占满屏幕宽度 */
            font-weight: 900;
            color: #000000;
            letter-spacing: -0.03em; /* 字母微紧凑，更有力量感 */
            line-height: 1; /* 取消默认行高，避免多余间距 */
        }

        /* 副标题 CLICK */
        .click-subtitle {
            font-size: 3vw; /* 比主标题小很多，形成强烈对比 */
            font-weight: 700;
            color: #000000;
            letter-spacing: 0.2em; /* 字母间距大一点，增加设计感 */
            text-transform: uppercase;
            margin-top: 1.5vw; /* 两个文字之间的间距，随屏幕比例变化 */
        }

        /* 鼠标悬停效果 */
        .start-button:hover .start-title {
            color: #333333;
            transition: color 0.3s ease;
        }

        .start-button:hover .click-subtitle {
            color: #333333;
            transform: scale(1.02);
            transition: all 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="start-button" id="enterButton">
        <div class="start-title">START</div>
        <div class="click-subtitle">CLICK</div>
    </div>

    <script>
        // 点击任意文字区域跳转到作品集主页面
        document.getElementById('enterButton').addEventListener('click', function() {
            window.location.href = 'main.html';
        });
    </script>
</body>
</html>
